# LightGBM 하이퍼파라미터 (튜닝/스윕 대상).
# seed / n_jobs / verbose 같은 인프라 값은 train.py 가 src.config 기준으로 주입한다.
name: lgbm
params:
  objective: binary      # 회귀면 regression, 다중분류면 multiclass 등으로 교체
  metric: auc            # config.METRIC 과 일치시킬 것
  boosting_type: gbdt
  learning_rate: 0.05
  num_leaves: 63
  feature_fraction: 0.8
  bagging_fraction: 0.8
  bagging_freq: 1
  min_child_samples: 50
  is_unbalance: false    # 순위 기반 지표(AUC)면 기본 미사용 — on/off 는 실험으로 비교
num_boost_round: 5000
early_stopping: 200
