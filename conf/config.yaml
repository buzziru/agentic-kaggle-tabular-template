# Hydra 루트 설정 — 튜닝/실험 노브의 단일 진입점.
# 구조적 상수(경로·컬럼·CV·W&B project)는 src/config.py 유지.
defaults:
  - model: lgbm
  - features: base
  - _self_

exp_id: ???        # 필수 (CLI 로 지정: exp_id=exp_002)
notes: ""
use_wandb: true
n_folds: 5         # split 다양성: 7/10-fold OOF 는 5-fold 와 직교(d_eff 축). 기본=src.config.N_FOLDS
max_folds: null    # null=전체. N(>=1)이면 동일 분할의 앞 N fold 만 실행(스크리닝용)
kill_criterion: "" # 스파이크 전 사전 중단조건 선언(과몰입 구조적 가드). JSON 로그에 기록
seed: 42           # 모델/run seed (seed averaging 노브). ⚠️ fold 분할 seed 는 src.config.SEED 영구 고정 — 이 노브는 모델 random_state·seed_everything 만. 바꿔도 fold 불변.

# (선택) 외부 원본 데이터 train 증강 (검증/test 미포함).
augment:
  enabled: false   # true 면 fold 의 train 부분에만 원본 추가
  weight: 1.0      # 원본 행 sample weight (원 데이터 행=1.0)

hydra:
  job:
    chdir: false   # cwd 변경 안 함 (src.config 절대경로 사용)
  run:
    dir: outputs/${exp_id}
  sweep:
    dir: outputs/multirun
    subdir: ${hydra.job.num}
